<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNISIA HD — ポータルデモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:linear-gradient(160deg,#1a1a5e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.wrap{width:100%;max-width:480px;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#4f9cf9,#a78bfa);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.logo-text{color:#fff;font-size:22px;font-weight:800;letter-spacing:0.5px}
.logo-sub{color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.card{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;margin-bottom:16px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:left}
.card:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.card-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-icon.blue{background:linear-gradient(135deg,#4f9cf9,#3b82f6)}
.card-icon.purple{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.card-name{font-size:16px;font-weight:700;color:#fff}
.card-role{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.card-desc{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6}
.footer{color:rgba(255,255,255,0.25);font-size:11px;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <div class="logo-text">UNISIA HD</div>
  </div>
  <div class="logo-sub">統合ポータル — デモ</div>

  <a class="card" href="統合ポータル_一般社員.html">
    <div class="card-top">
      <div class="card-icon blue">👤</div>
      <div>
        <div class="card-name">一般社員ポータル</div>
        <div class="card-role">General Staff</div>
      </div>
    </div>
    <div class="card-desc">チャット（社内・Google Chat・Chatwork・LINE統合）・各種申請・勤怠管理・臨店報告書（QSCチェック100項目）</div>
  </a>

  <a class="card" href="統合ポータル_管理職.html">
    <div class="card-top">
      <div class="card-icon purple">👔</div>
      <div>
        <div class="card-name">管理職ポータル</div>
        <div class="card-role">Manager</div>
      </div>
    </div>
    <div class="card-desc">チャット・申請承認（部下一覧・承認・却下）・メンバー勤怠状況（残業アラート・外国人就労アラート）・臨店報告書</div>
  </a>

  <div class="footer">© 2026 Unisia Holdings — Powered by Dandori Work</div>
</div>
</body>
</html>
